      note: "Major Group: Meta's egocentric AR research program — 8 public datasets (Nymeria, HOT3D, ADT, AEA, ASE, DTC, AEO, Gen2 Pilot) covering body motion, hand-object, scene understanding, synthetic environments",
      path: "subpages/aria_group.html",
      arxiv: "https://arxiv.org/abs/2308.13561",
      pdf: "",
      topic: "Major Group",
      subtopic: "Meta Reality Labs"
    }
  ];

  /* Topic display order */
  const TOPIC_ORDER = ["Public Datasets", "Single-View SMPLX regression", "Ego-to-Exo SMPLX Regression", "Hand Regression", "Major Group"];

  let activePaper = null;

  const els = {
    list:       document.getElementById("paperList"),
    search:     document.getElementById("searchInput"),
    count:      document.getElementById("countPill"),
    panelTitle: document.getElementById("panelTitle"),
    panelSub:   document.getElementById("panelSub"),
    empty:      document.getElementById("emptyState"),
    frame:      document.getElementById("paperFrame"),
    topicGrid:       document.getElementById("topicGrid"),
    relatedWorkGrid: document.getElementById("relatedWorkGrid"),
    totalCount: document.getElementById("totalCount"),
    btnArxiv:   document.getElementById("btnArxiv"),
    btnPdf:     document.getElementById("btnPdf"),
  };

  /* ── Render sidebar list ── */
  function renderList(items) {
    els.list.innerHTML = "";
    const sorted = [...items].sort((a, b) => b.year - a.year);
    sorted.forEach(p => {
      const div = document.createElement("div");
      div.className = "item";
      div.dataset.id = p.id;
      div.innerHTML = `
        <div class="badge">${p.year}</div>
        <div class="meta">
          <div class="abbr">${escapeHtml(p.abbr)}</div>
          <div class="desc">${escapeHtml(p.note || "")}</div>
        </div>`;
      div.addEventListener("click", () => selectPaper(p));
      els.list.appendChild(div);
    });
    els.count.textContent = `${items.length} papers`;
  }

  /* ── Select paper → iframe ── */
  function selectPaper(p) {
    activePaper = p;
    document.querySelectorAll(".item").forEach(n =>
      n.classList.toggle("active", n.dataset.id === p.id)
    );
    els.panelTitle.textContent = `${p.abbr} (${p.year})`;
    els.panelSub.textContent   = `加载：${p.path}`;

    if (p.arxiv) {
      els.btnArxiv.style.display = "inline-block";
      els.btnArxiv.textContent = "ArXiv";
      els.btnArxiv.onclick = () => window.open(p.arxiv, "_blank");
    } else { els.btnArxiv.style.display = "none"; }

    if (p.pdf) {
      els.btnPdf.style.display = "inline-block";
      els.btnPdf.textContent = "PDF";
      els.btnPdf.onclick = () => window.open(p.pdf, "_blank");
    } else { els.btnPdf.style.display = "none"; }

    els.empty.style.display = "none";
    els.frame.style.display = "block";
    els.frame.src = p.path;
  }

  function selectPaperById(id) {
    const p = PAPERS.find(x => x.id === id);
    if (p) selectPaper(p);
  }

  /* ── Dashboard ── */
  const RELATED_WORK_TOPICS = new Set(["Major Group", "CVPR Trend", "Future Work"]);
  const TOPIC_ORDER_INDEX = new Map(TOPIC_ORDER.map((topic, idx) => [topic, idx]));

  function latestYear(items) {
    return items.reduce((max, p) => Math.max(max, Number(p.year) || -Infinity), -Infinity);
  }

  function papersForTopic(byTopic, topic) {
    return Object.values(byTopic[topic] || {}).flat();
  }

  function compareByLatestYearThenName(a, b) {
    const diff = b.latestYear - a.latestYear;
    if (diff !== 0) return diff;

    const orderA = TOPIC_ORDER_INDEX.has(a.name) ? TOPIC_ORDER_INDEX.get(a.name) : Infinity;
    const orderB = TOPIC_ORDER_INDEX.has(b.name) ? TOPIC_ORDER_INDEX.get(b.name) : Infinity;
    if (orderA !== orderB) return orderA - orderB;

    return a.name.localeCompare(b.name);
  }

  function sortTopicsByLatestYear(topics, byTopic) {
    return [...topics]
      .map(name => ({ name, latestYear: latestYear(papersForTopic(byTopic, name)) }))
      .sort(compareByLatestYearThenName)
      .map(t => t.name);
  }

  function sortSubtopicsByLatestYear(subs) {
    return Object.entries(subs)
      .map(([name, list]) => ({ name, list, latestYear: latestYear(list) }))
      .sort(compareByLatestYearThenName);
  }

  function buildTopicCards(topics, byTopic) {
    let html = "";
    for (const topic of topics) {
      const subs = byTopic[topic] || {};
      const allInTopic = Object.values(subs).flat();
      allInTopic.sort((a, b) => b.year - a.year);
      html += `<div class="topic-card">
        <h4>${escapeHtml(topic)} <span style="opacity:.5;font-weight:normal;">(${allInTopic.length})</span></h4>`;
      if (allInTopic.length === 0) {
        html += `<p style="font-size:12px;color:rgba(232,236,255,.35);margin:0 0 4px;">No papers yet.</p>`;
      } else {
        const subNames = Object.keys(subs);
        if (subNames.length === 1 && subNames[0] === "General") {
          html += `<ul>`;
          allInTopic.forEach(p => {
            html += `<li onclick="selectPaperById('${p.id}')">${escapeHtml(p.abbr)} <span style="opacity:.55;font-size:11px;">(${p.year})</span></li>`;
          });
          html += `</ul>`;
        } else {
          for (const { name: sub, list: subList } of sortSubtopicsByLatestYear(subs)) {
            const list = [...subList].sort((a, b) => b.year - a.year);
            html += `<div style="margin-top:8px;">
              <div style="font-size:11px;color:var(--accent);opacity:.8;margin-bottom:4px;">${escapeHtml(sub)}</div>
              <ul>`;
            list.forEach(p => {
              html += `<li onclick="selectPaperById('${p.id}')">${escapeHtml(p.abbr)} <span style="opacity:.55;font-size:11px;">(${p.year})</span></li>`;
            });
            html += `</ul></div>`;
          }
        }
      }
      html += `</div>`;
    }
    return html;
  }

  function renderDashboard() {
    els.totalCount.textContent = `— ${PAPERS.length} papers`;

    // Group all papers by topic → subtopic
    const byTopic = {};
    PAPERS.forEach(p => {
      if (!byTopic[p.topic]) byTopic[p.topic] = {};
      const sub = p.subtopic || "General";
      if (!byTopic[p.topic][sub]) byTopic[p.topic][sub] = [];
      byTopic[p.topic][sub].push(p);
    });

    // Main topics (exclude Related Work topics)
    const mainTopics = [...new Set([...TOPIC_ORDER, ...Object.keys(byTopic)])]
      .filter(t => !RELATED_WORK_TOPICS.has(t));

    // Related Work topics
    const rwTopics = [...new Set([...Object.keys(byTopic)])]
      .filter(t => RELATED_WORK_TOPICS.has(t));

    els.topicGrid.innerHTML       = buildTopicCards(sortTopicsByLatestYear(mainTopics, byTopic), byTopic);
    els.relatedWorkGrid.innerHTML = buildTopicCards(sortTopicsByLatestYear(rwTopics, byTopic), byTopic);

    els.panelTitle.textContent = "MaxInsights-Intern";
    els.panelSub.textContent   = `📊 Topics & Papers (${PAPERS.length} papers)`;
    els.btnArxiv.style.display = "none";
    els.btnPdf.style.display   = "none";
  }

  /* ── Search ── */
  function applySearch() {
    const q = els.search.value.trim().toLowerCase();
    const filtered = q
      ? PAPERS.filter(p => `${p.abbr} ${p.year} ${p.note} ${p.id} ${p.topic}`.toLowerCase().includes(q))
      : PAPERS;
    renderList(filtered);
  }

  els.search.addEventListener("input", applySearch);

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;").replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  /* ── Init ── */
  renderList(PAPERS);
  renderDashboard();
</script>
</body>
</html>
